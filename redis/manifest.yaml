apiVersion: v1
kind: Pod
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 2
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
  containers:
    - name: redis
      image: viharireddy18/redis:1.0.0
      ports:
        - containerPort: 6379
          protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  type: ClusterIP # Optional, as it is the default type
  selector:
    project: roboshop
    tier: db
    component: redis # Matches pods with the label 'app: my-app'
  ports:
    - protocol: TCP
      port: 6379 # Port the service listens on inside the cluster
      targetPort: 6379 # Port the pod container is listening on
